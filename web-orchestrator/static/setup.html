<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSG — Первый запуск</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0f1a;
    font-family: 'Syne', sans-serif;
    color: #f1f5f9;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(16,185,129,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    width: min(420px, calc(100vw - 32px));
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 36px;
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 1;
  }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: #64748b; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
    color: #6ee7b7; font-size: 11px; font-weight: 700;
    margin-bottom: 16px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; line-height: 1.5; }
  label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
  .input-wrap { position: relative; margin-bottom: 14px; }
  input[type=password] {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #f1f5f9;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=password]:focus { border-color: rgba(16,185,129,0.5); }
  button[type=submit] {
    width: 100%; padding: 12px; margin-top: 6px;
    background: linear-gradient(135deg, #10b981, #059669);
    border: none; border-radius: 10px; color: #fff;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  button[type=submit]:hover { opacity: 0.9; }
  button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    margin-top: 12px; padding: 10px 14px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; color: #fca5a5; font-size: 13px; display: none;
  }
  .hint { font-size: 11px; color: #475569; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div>
      <div class="logo-text">GlobalShield</div>
      <div class="logo-sub">Smart Gateway</div>
    </div>
  </div>

  <div class="badge">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Первый запуск
  </div>
  <h1>Задайте пароль</h1>
  <p class="subtitle">Придумайте пароль для входа в веб-интерфейс GSG. Сохраните его — восстановление возможно только через SSH.</p>

  <form id="setupForm" onsubmit="doSetup(event)">
    <label for="pw1">Пароль</label>
    <div class="input-wrap">
      <input type="password" id="pw1" autocomplete="new-password" autofocus placeholder="Минимум 6 символов">
    </div>
    <label for="pw2">Повторите пароль</label>
    <div class="input-wrap">
      <input type="password" id="pw2" autocomplete="new-password" placeholder="Повторите пароль">
    </div>
    <button type="submit" id="submitBtn">Сохранить и войти</button>
    <div class="error" id="errMsg"></div>
  </form>
  <p class="hint">Сменить пароль можно в боковом меню интерфейса</p>
</div>

<script>
async function doSetup(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  err.style.display = 'none';
  if (pw1 !== pw2) { err.textContent = 'Пароли не совпадают'; err.style.display = 'block'; return; }
  if (pw1.length < 6) { err.textContent = 'Минимум 6 символов'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Сохранение...';
  try {
    const r = await fetch('/api/auth/setup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw1})
    });
    if (r.ok) {
      window.location.href = '/';
    } else {
      const d = await r.json().catch(() => ({}));
      err.textContent = d.detail || 'Ошибка';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Сохранить и войти';
    }
  } catch {
    err.textContent = 'Ошибка соединения';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Сохранить и войти';
  }
}
</script>
</body>
</html>
