<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSG — Вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0f1a;
    font-family: 'Syne', sans-serif;
    color: #f1f5f9;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    width: min(380px, calc(100vw - 32px));
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 36px;
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 1;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: #64748b; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
  .input-wrap { position: relative; margin-bottom: 20px; }
  input[type=password] {
    width: 100%;
    padding: 11px 44px 11px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #f1f5f9;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=password]:focus { border-color: rgba(59,130,246,0.5); }
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #64748b;
    padding: 2px;
    display: flex;
  }
  .toggle-pw:hover { color: #94a3b8; }
  button[type=submit] {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button[type=submit]:hover { opacity: 0.9; }
  button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div>
      <div class="logo-text">GlobalShield</div>
      <div class="logo-sub">Smart Gateway</div>
    </div>
  </div>

  <h1>Вход</h1>
  <p class="subtitle">Введите пароль для доступа к интерфейсу</p>

  <form id="loginForm" onsubmit="doLogin(event)">
    <label for="pw">Пароль</label>
    <div class="input-wrap">
      <input type="password" id="pw" autocomplete="current-password" autofocus placeholder="••••••••••••">
      <button type="button" class="toggle-pw" onclick="togglePw()" tabindex="-1">
        <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button type="submit" id="submitBtn">Войти</button>
    <div class="error" id="errMsg"></div>
  </form>
</div>

<script>
function togglePw() {
  const input = document.getElementById('pw');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  const password = document.getElementById('pw').value;
  btn.disabled = true;
  btn.textContent = 'Проверка...';
  err.style.display = 'none';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password})
    });
    if (r.ok) {
      window.location.href = '/';
    } else {
      const d = await r.json().catch(() => ({}));
      err.textContent = d.detail || 'Неверный пароль';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  } catch {
    err.textContent = 'Ошибка соединения';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
}
</script>
</body>
</html>
